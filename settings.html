<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension-block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_action_format" type="checkbox" />
                <label for="tool_action_format">动作格式 - 用*包裹选中文本</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quote_format" type="checkbox" />
                <label for="tool_quote_format">对话格式 - 用\"包裹选中文本</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_copy_last" type="checkbox" />
                <label for="tool_copy_last">复制上条 - 复制AI最后一条回复</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_clear_regen" type="checkbox" />
                <label for="tool_clear_regen">清空重发 - 清空输入框并重新生成</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_system_prompt" type="checkbox" />
                <label for="tool_system_prompt">系统提示 - 插入快捷系统指令</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_chat_stats" type="checkbox" />
                <label for="tool_chat_stats">聊天统计 - 显示当前聊天统计信息</label>
            </div>
        </div>
    </div>
</div>
