<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>⚡ 工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension_block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            
            <hr class="sysHR" />
            <div style="color: rgba(168, 85, 247, 0.9); font-size: 12px; margin-bottom: 12px; font-weight: 600;">
                🎭 角色一致性与设定强化
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_anchor" type="checkbox" />
                <label for="tool_anchor">⚓ 角色设定锚点注入器</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_ooc" type="checkbox" />
                <label for="tool_ooc">🔍 OOC实时检测与修正</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_status" type="checkbox" />
                <label for="tool_status">📊 角色状态追踪面板</label>
            </div>
            
            <hr class="sysHR" />
            <div style="color: rgba(168, 85, 247, 0.9); font-size: 12px; margin-bottom: 12px; font-weight: 600;">
                🧠 智能上下文管理
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_summary" type="checkbox" />
                <label for="tool_summary">📝 上下文智能裁剪与摘要</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_mark" type="checkbox" />
                <label for="tool_mark">🏷️ 关键信息标记与检索</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_branch" type="checkbox" />
                <label for="tool_branch">🌳 聊天分支快速切换</label>
            </div>
            
            <hr class="sysHR" />
            <div style="color: rgba(168, 85, 247, 0.9); font-size: 12px; margin-bottom: 12px; font-weight: 600;">
                ✨ 提示词工程与生成辅助
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_template" type="checkbox" />
                <label for="tool_template">📋 动态提示词模板引擎</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_batch" type="checkbox" />
                <label for="tool_batch">📨 多轮回复批量发送</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_optimize" type="checkbox" />
                <label for="tool_optimize">✨ 提示词优化器</label>
            </div>
            
            <hr class="sysHR" />
            <div style="color: rgba(168, 85, 247, 0.9); font-size: 12px; margin-bottom: 12px; font-weight: 600;">
                🎬 沉浸式体验增强
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_scene" type="checkbox" />
                <label for="tool_scene">🎬 场景自动生成与切换</label>
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_character" type="checkbox" />
                <label for="tool_character">🎭 多角色互动调度器</label>
            </div>
            
            <hr class="sysHR" />
            <div style="color: rgba(168, 85, 247, 0.9); font-size: 12px; margin-bottom: 12px; font-weight: 600;">
                💾 效率自动化
            </div>
            
            <div class="toolbox-extension_block flex-container">
                <input id="tool_export" type="checkbox" />
                <label for="tool_export">💾 聊天内容批量导出</label>
            </div>
        </div>
    </div>
</div>
