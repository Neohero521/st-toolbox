<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🎯 工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension-block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_action_insert" type="checkbox" />
                <label for="tool_action_insert">星号动作描述</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quick_preset" type="checkbox" />
                <label for="tool_quick_preset">快捷预设文本</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quick_command" type="checkbox" />
                <label for="tool_quick_command">快捷命令</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_emoji_picker" type="checkbox" />
                <label for="tool_emoji_picker">表情快捷插入</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_chat_stats" type="checkbox" />
                <label for="tool_chat_stats">聊天统计</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_clear_input" type="checkbox" />
                <label for="tool_clear_input">清空输入框</label>
            </div>
        </div>
    </div>
</div>
