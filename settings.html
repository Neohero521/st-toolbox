<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>AI工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension_block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension_block flex-container">
                <input id="tool_anchor" type="checkbox" />
                <label for="tool_anchor">角色锚点功能</label>
            </div>
            <div class="toolbox-extension_block flex-container">
                <input id="tool_state" type="checkbox" />
                <label for="tool_state">状态追踪功能</label>
            </div>
            <div class="toolbox-extension_block flex-container">
                <input id="tool_mark" type="checkbox" />
                <label for="tool_mark">信息标记功能</label>
            </div>
            <div class="toolbox-extension_block flex-container">
                <input id="tool_template" type="checkbox" />
                <label for="tool_template">提示词模板功能</label>
            </div>
            <div class="toolbox-extension_block flex-container">
                <input id="tool_optimizer" type="checkbox" />
                <label for="tool_optimizer">提示词优化功能</label>
            </div>
            <div class="toolbox-extension_block flex-container">
                <input id="tool_export" type="checkbox" />
                <label for="tool_export">导出功能</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension_block flex-container" style="flex-direction: column; align-items: stretch;">
                <label for="tool_custom_keywords" style="margin-bottom: 6px; color: rgba(255, 255, 255, 0.8);">自定义锚点关键词：</label>
                <textarea id="tool_custom_keywords" rows="2" style="
                    width: 100%; 
                    background: rgba(255, 255, 255, 0.05); 
                    border: 1px solid rgba(99, 102, 241, 0.3); 
                    border-radius: 6px; 
                    color: rgba(255, 255, 255, 0.9); 
                    padding: 8px; 
                    font-size: 12px;
                    resize: vertical;
                " placeholder="每行一个，如：禁止暴力"></textarea>
            </div>
        </div>
    </div>
</div>
