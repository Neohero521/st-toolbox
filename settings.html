<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension-block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_anchor_inject" type="checkbox" />
                <label for="tool_anchor_inject">🔒 锚点注入 - 强化角色设定防止OOC</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quick_fix" type="checkbox" />
                <label for="tool_quick_fix">🛠️ OOC修复 - 快速修复角色崩坏</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_char_state" type="checkbox" />
                <label for="tool_char_state">📊 状态追踪 - 查看角色当前状态</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_clear_input" type="checkbox" />
                <label for="tool_clear_input">🗑️ 清空 - 一键清空输入框</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quick_swipe" type="checkbox" />
                <label for="tool_quick_swipe">🔄 Swipe - 快速切换AI回复</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_char_info" type="checkbox" />
                <label for="tool_char_info">🎭 角色 - 查看角色信息</label>
            </div>
        </div>
    </div>
</div>
