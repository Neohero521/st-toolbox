<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension-block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quick_template" type="checkbox" />
                <label for="tool_quick_template">快捷预设 - 插入常用对话模板</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_char_preview" type="checkbox" />
                <label for="tool_char_preview">角色预览 - 查看当前角色信息</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_format_text" type="checkbox" />
                <label for="tool_format_text">格式化 - 自动格式化文本</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_emoji_library" type="checkbox" />
                <label for="tool_emoji_library">表情库 - 插入随机表情</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_temp_worldinfo" type="checkbox" />
                <label for="tool_temp_worldinfo">临时信息 - 插入临时场景设定</label>
            </div>
        </div>
    </div>
</div>
