<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension-block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_anchor_inject" type="checkbox" />
                <label for="tool_anchor_inject">设定锚点注入器</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_ooc_detect" type="checkbox" />
                <label for="tool_ooc_detect">OOC 实时检测</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_char_state" type="checkbox" />
                <label for="tool_char_state">角色状态追踪</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block">
                <label>自定义锚点关键词：</label>
                <div style="margin-top: 8px; display: flex; gap: 8px;">
                    <input id="new_keyword" type="text" placeholder="添加关键词" style="flex: 1; padding: 4px 8px;" />
                    <button id="add_keyword_btn" class="menu_button">添加</button>
                </div>
            </div>
        </div>
    </div>
</div>
