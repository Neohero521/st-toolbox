<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-extension-block flex-container">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-extension-block flex-container">
                <input id="tool_clear_input" type="checkbox" />
                <label for="tool_clear_input">清空 - 一键清空输入框</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_quick_swipe" type="checkbox" />
                <label for="tool_quick_swipe">Swipe - 快速切换AI回复</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_edit_last" type="checkbox" />
                <label for="tool_edit_last">编辑 - 编辑上一条AI回复</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_slash_command" type="checkbox" />
                <label for="tool_slash_command">命令 - 插入常用Slash命令</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_sys_prompt" type="checkbox" />
                <label for="tool_sys_prompt">系统 - 插入系统提示词</label>
            </div>
            <div class="toolbox-extension-block flex-container">
                <input id="tool_char_info" type="checkbox" />
                <label for="tool_char_info">角色 - 查看角色信息</label>
            </div>
        </div>
    </div>
</div>
