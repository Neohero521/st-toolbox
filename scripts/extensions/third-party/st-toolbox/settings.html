<div class="toolbox-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>工具箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="toolbox-tool-block">
                <input id="enable_toolbox" type="checkbox" />
                <label for="enable_toolbox">启用工具箱</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-tool-block">
                <input id="tool_timestamp" type="checkbox" />
                <label for="tool_timestamp">时间戳按钮</label>
            </div>
            <div class="toolbox-tool-block">
                <input id="tool_datetime" type="checkbox" />
                <label for="tool_datetime">日期时间按钮</label>
            </div>
            <div class="toolbox-tool-block">
                <input id="tool_copy_last" type="checkbox" />
                <label for="tool_copy_last">复制上一条消息按钮</label>
            </div>
            <div class="toolbox-tool-block">
                <input id="tool_clear_input" type="checkbox" />
                <label for="tool_clear_input">清空输入框按钮</label>
            </div>
            <hr class="sysHR" />
            <div class="toolbox-tool-block">
                <input id="tool_uppercase" type="checkbox" />
                <label for="tool_uppercase">转为大写按钮</label>
            </div>
            <div class="toolbox-tool-block">
                <input id="tool_lowercase" type="checkbox" />
                <label for="tool_lowercase">转为小写按钮</label>
            </div>
            <div class="toolbox-tool-block">
                <input id="tool_trim" type="checkbox" />
                <label for="tool_trim">去除首尾空格按钮</label>
            </div>
        </div>
    </div>
</div>
