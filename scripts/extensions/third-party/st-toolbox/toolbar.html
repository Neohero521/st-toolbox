<div id="toolbox_toolbar" class="qr--buttons qr--color" data-mobile-safe="true">
    <button id="toolbox_timestamp_btn" class="qr--button menu_button interactable" title="插入时间戳" data-norefocus="true">🕐</button>
    <button id="toolbox_datetime_btn" class="qr--button menu_button interactable" title="插入日期时间" data-norefocus="true">📅</button>
    <button id="toolbox_copy_btn" class="qr--button menu_button interactable" title="复制上一条AI消息" data-norefocus="true">📋</button>
    <button id="toolbox_clear_btn" class="qr--button menu_button interactable" title="清空输入框" data-norefocus="true">🗑</button>
    <button id="toolbox_upper_btn" class="qr--button menu_button interactable" title="转为大写" data-norefocus="true">ABC</button>
    <button id="toolbox_lower_btn" class="qr--button menu_button interactable" title="转为小写" data-norefocus="true">abc</button>
    <button id="toolbox_trim_btn" class="qr--button menu_button interactable" title="去除首尾空格" data-norefocus="true">✂</button>
</div>
